name: Install Cypress Dependencies

on:
  workflow_dispatch:

jobs:
  install-cypress-deps:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Update apt package lists
        run: sudo apt-get update

      - name: Generate apt cache key
        id: apt-key
        run: echo "hash=$(sha256sum /var/lib/apt/lists/*Packages 2>/dev/null | sha256sum | cut -d' ' -f1)" >> "$GITHUB_OUTPUT"

      - name: Restore apt cache
        uses: actions/cache@v5
        with:
          path: ~/apt-debs
          key: apt-cypress-${{ steps.apt-key.outputs.hash }}

      - name: Install Cypress dependencies
        run: |
          if [ -d ~/apt-debs ]; then
            sudo cp ~/apt-debs/*.deb /var/cache/apt/archives/ 2>/dev/null || true
          fi
          sudo apt-get -y install libgtk-3-0t64 libgbm-dev libnotify-dev libnss3 libxss1 libasound2t64 libxtst6 xauth xvfb
          mkdir -p ~/apt-debs
          cp /var/cache/apt/archives/*.deb ~/apt-debs/ 2>/dev/null || true

      - name: List installed apt packages
        run: apt list --installed
